services:
  app:
    container_name: ${APP_NAME}-app
    build: ./
    restart: unless-stopped
    ports:
      - ${SERVER_PORT}:8080
    env_file:
      - .env
    environment:
      - SERVICE_NAME=${APP_NAME}
    depends_on:
      - db
      - redis

  db:
    image: postgres:18.0
    container_name: ${APP_NAME}-db
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 3s
      timeout: 3s
      retries: 10
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - ${DB_PORT}:5432
    volumes:
      - api-users_volume:/var/lib/postgresql

  redis:
    image: redis:7
    container_name: ${APP_NAME}-redis
    restart: always
    ports:
      - ${REDIS_PORT}:6379
    command: redis-server --save 60 1 --loglevel warning

volumes:
  api-users_volume:
